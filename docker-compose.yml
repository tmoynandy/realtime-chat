services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file: [.env]
    depends_on:
      - db
      - cache

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-realtime-chat}
    ports: ["5432:5432"]
    volumes: [db-data:/var/lib/postgresql/data]

  cache:
    image: redis:7-alpine
    ports: ["6379:6379"]

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports: ["4222:4222"]

volumes:
  db-data: {}
