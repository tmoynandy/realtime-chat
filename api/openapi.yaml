openapi: 3.1.0
info:
  title: realtime-chat
  version: 0.1.0
  description: Generated by Helios.
servers:
  - url: https://api.example.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /users/{id}:
    get:
      summary: "Get a user by ID"
      operationId: getUsersById
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users:
    post:
      summary: "Create a new user"
      operationId: postUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /auth/login:
    post:
      summary: "Login and issue JWT"
      operationId: postAuthLogin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
  /health:
    get:
      summary: "Liveness probe"
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
